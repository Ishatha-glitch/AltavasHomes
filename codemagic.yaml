workflows:
  android-workflow:
    name: AltavasHomes Android
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        SUPABASE_URL: "https://aqxgigbomvqjuqadlohx.supabase.co"
        SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxeGdpZ2JvbXZxanVxYWRsb2h4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMzk5OTksImV4cCI6MjA5OTcxNTk5OX0.TRyceQXW5uVTndr3FAYBLlsiM_dVUsIu18XOdo25iSs"
    scripts:
      - name: Write .env file
        script: |
          echo "SUPABASE_URL=$SUPABASE_URL" > .env
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env
      - name: Generate native platform folders if missing
        script: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android,ios,web --project-name altavashomes --org com.altavashomes .
          fi
      - name: Add location permissions and Maps API key to AndroidManifest
        script: |
          python3 - << 'PYEOF'
          import os

          path = "android/app/src/main/AndroidManifest.xml"
          with open(path) as f:
              content = f.read()

          if "ACCESS_FINE_LOCATION" not in content:
              perms = (
                  '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n'
                  '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>\n'
                  '<uses-permission android:name="android.permission.INTERNET"/>\n'
                  '    <application'
              )
              content = content.replace('    <application', perms, 1)

          api_key = os.environ.get("GOOGLE_MAPS_API_KEY", "")
          if "com.google.android.geo.API_KEY" not in content:
              maps_key = (
                  '        <meta-data android:name="com.google.android.geo.API_KEY" android:value="' + api_key + '"/>\n'
                  '    </application>'
              )
              content = content.replace('    </application>', maps_key, 1)

          with open(path, "w") as f:
              f.write(content)

          print("AndroidManifest patched. Maps key present:", bool(api_key))
          PYEOF
      - name: Bump Android compileSdk/targetSdk to 36
        script: |
          GRADLE_FILE="android/app/build.gradle.kts"
          if [ ! -f "$GRADLE_FILE" ]; then
            GRADLE_FILE="android/app/build.gradle"
          fi
          echo "Before:"
          grep -n "compileSdk\|targetSdk" "$GRADLE_FILE"
          sed -i '' -E 's/^([[:space:]]*)compileSdk[[:space:]]*=.*/\1compileSdk = 36/' "$GRADLE_FILE"
          sed -i '' -E 's/^([[:space:]]*)targetSdk[[:space:]]*=.*/\1targetSdk = 36/' "$GRADLE_FILE"
          echo "After:"
          grep -n "compileSdk\|targetSdk" "$GRADLE_FILE"
          echo "Root gradle files:"
          find android -maxdepth 2 -iname "build.gradle*"
          echo "settings.gradle content:"
          cat android/settings.gradle.kts 2>/dev/null || cat android/settings.gradle 2>/dev/null
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK (debug-signed, for direct install / testing)
        script: flutter build apk --release
      - name: Build App Bundle (for Play Store)
        script: flutter build appbundle --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - you@example.com

  ios-workflow:
    name: AltavasHomes iOS
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        SUPABASE_URL: $SUPABASE_URL
        SUPABASE_ANON_KEY: $SUPABASE_ANON_KEY
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.altavashomes.app
    scripts:
      - name: Write .env file
        script: |
          echo "SUPABASE_URL=$SUPABASE_URL" > .env
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env
      - name: Generate native platform folders if missing
        script: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android,ios,web --project-name altavashomes --org com.altavashomes .
          fi
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Flutter build ipa
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - you@example.com

  web-workflow:
    name: AltavasHomes Web
    max_build_duration: 30
    environment:
      flutter: stable
      vars:
        SUPABASE_URL: $SUPABASE_URL
        SUPABASE_ANON_KEY: $SUPABASE_ANON_KEY
    scripts:
      - name: Write .env file
        script: |
          echo "SUPABASE_URL=$SUPABASE_URL" > .env
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env
      - name: Generate native platform folders if missing
        script: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android,ios,web --project-name altavashomes --org com.altavashomes .
          fi
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build web release
        script: flutter build web --release
    artifacts:
      - build/web/**
    publishing:
      email:
        recipients:
          - you@example.com
