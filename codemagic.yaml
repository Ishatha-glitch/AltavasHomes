workflows:
  android-workflow:
    name: AltavasHomes Android
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        SUPABASE_URL: "https://aqxgigbomvqjuqadlohx.supabase.co"
        SUPABASE_ANON_KEY: "sb_publishable_n6OfKO-d3fmICCWJn6wtXg_KKAucpaR"
    scripts:
      - name: Write .env file
        script: |
          echo "SUPABASE_URL=$SUPABASE_URL" > .env
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env
      - name: Generate native platform folders if missing
        script: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android,ios,web --project-name altavashomes --org com.altavashomes .
          fi
      - name: Bump Android compileSdk/targetSdk to 36
        script: |
          GRADLE_FILE="android/app/build.gradle.kts"
          if [ ! -f "$GRADLE_FILE" ]; then
            GRADLE_FILE="android/app/build.gradle"
          fi
          echo "Before:"
          grep -n "compileSdk\|targetSdk" "$GRADLE_FILE"
          sed -i '' -E 's/^([[:space:]]*)compileSdk[[:space:]]*=.*/\1compileSdk = 36/' "$GRADLE_FILE"
          sed -i '' -E 's/^([[:space:]]*)targetSdk[[:space:]]*=.*/\1targetSdk = 36/' "$GRADLE_FILE"
          echo "After:"
          grep -n "compileSdk\|targetSdk" "$GRADLE_FILE"
          echo "Root gradle files:"
          find android -maxdepth 2 -iname "build.gradle*"
          echo "settings.gradle content:"
          cat android/settings.gradle.kts 2>/dev/null || cat android/settings.gradle 2>/dev/null
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK (debug-signed, for direct install / testing)
        script: flutter build apk --release
      - name: Build App Bundle (for Play Store)
        script: flutter build appbundle --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - you@example.com

  ios-workflow:
    name: AltavasHomes iOS
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        SUPABASE_URL: $SUPABASE_URL
        SUPABASE_ANON_KEY: $SUPABASE_ANON_KEY
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.altavashomes.app
    scripts:
      - name: Write .env file
        script: |
          echo "SUPABASE_URL=$SUPABASE_URL" > .env
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env
      - name: Generate native platform folders if missing
        script: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android,ios,web --project-name altavashomes --org com.altavashomes .
          fi
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Flutter build ipa
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - you@example.com

  web-workflow:
    name: AltavasHomes Web
    max_build_duration: 30
    environment:
      flutter: stable
      vars:
        SUPABASE_URL: $SUPABASE_URL
        SUPABASE_ANON_KEY: $SUPABASE_ANON_KEY
    scripts:
      - name: Write .env file
        script: |
          echo "SUPABASE_URL=$SUPABASE_URL" > .env
          echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env
      - name: Generate native platform folders if missing
        script: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android,ios,web --project-name altavashomes --org com.altavashomes .
          fi
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build web release
        script: flutter build web --release
    artifacts:
      - build/web/**
    publishing:
      email:
        recipients:
          - you@example.com
