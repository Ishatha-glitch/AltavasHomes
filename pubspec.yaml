name: altavashomes
description: AltavasHomes — rentals, rent tracking, and service bookings for tenants, landlords, and service providers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Backend
  supabase_flutter: ^2.5.6

  # State management
  provider: ^6.1.2

  # Routing (role-based redirects)
  go_router: ^14.2.0

  # Maps + GPS
  google_maps_flutter: ^2.7.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # Media
  image_picker: ^1.1.2

  # Formatting
  intl: ^0.19.0

  # Env config
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
